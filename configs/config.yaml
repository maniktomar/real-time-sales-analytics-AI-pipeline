app:
  name: real-time-sales-analytics
  environment: local

kafka:
  bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
  sales_topic: ${KAFKA_SALES_TOPIC}
  log_topic: ${KAFKA_LOG_TOPIC}
  producer_events_per_second: ${PRODUCER_EVENTS_PER_SECOND}
  consumer_group: sales-streaming-pipeline

spark:
  app_name: ${SPARK_APP_NAME}
  checkpoint_base: ${SPARK_CHECKPOINT_BASE}
  trigger_processing_time: "15 seconds"
  watermark_delay: "10 minutes"

snowflake:
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  password: ${SNOWFLAKE_PASSWORD}
  role: ${SNOWFLAKE_ROLE}
  warehouse: ${SNOWFLAKE_WAREHOUSE}
  database: ${SNOWFLAKE_DATABASE}
  schema: ${SNOWFLAKE_SCHEMA}
  url: ${SNOWFLAKE_URL}

quality_rules:
  max_order_amount: 10000
  accepted_currencies: ["USD", "GBP", "EUR"]
  late_event_minutes: 10

